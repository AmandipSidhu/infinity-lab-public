# invalid_003_ambiguous_signals.yaml
# Expected errors (new schema):
#   SVR-E034 (banned vague term "trending" in entry condition)
# Expected warnings (new schema):
#   SVR-W030 (no time-based exit condition)

metadata:
  name: "Vague Trend Follower"
  trading_style: "swing"
  description: >
    A strategy with deliberately ambiguous signal language to trigger SVR-E034.
    Entry conditions use the banned term "trending" and exit conditions contain
    no time-based criterion to trigger SVR-W030.
  author: "Gut Trader"
  version: "1.0.0"

capital:
  allocation_usd: 50000

data:
  instruments:
    - "SPY"
    - "QQQ"
  resolution: "daily"
  start_date: "2018-01-01"
  end_date: "2024-12-31"

signals:
  entry:
    - "Enter when the stock is clearly trending with volume above 1.5x average"  # SVR-E034: 'trending'
    - "RSI(14) > 50"
  exit:
    - "Exit when price drops below the 20-day SMA"     # no time keyword — SVR-W030
    - "Exit when RSI(14) crosses below 40"             # no time keyword — SVR-W030

risk_management:
  stop_loss: 0.05
  position_sizing: "2% risk per trade"
  leverage: 1.0
  max_positions: 5
  risk_per_trade_pct: 0.02

acceptance_criteria:
  max_drawdown_pct: 20.0
  min_sharpe_ratio: 1.2
  min_profit_factor: 1.4
  min_trades: 200
  min_cagr: 15.0

assumptions:
  fees: 0.001
  slippage: 0.001

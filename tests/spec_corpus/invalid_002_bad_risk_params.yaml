# invalid_002_bad_risk_params.yaml
# Expected errors (new schema):
#   SVR-E025 (risk_management.leverage > 4)

metadata:
  name: "High Leverage Breakout"
  trading_style: "swing"
  description: >
    A swing strategy with excessive leverage intentionally set to 5x to trigger
    SVR-E025. All other fields are valid to isolate the leverage error.
  author: "Risk Taker"
  version: "0.1.0"

capital:
  allocation_usd: 100000

data:
  instruments:
    - "NVDA"
    - "AMD"
  resolution: "daily"
  start_date: "2015-01-01"
  end_date: "2024-12-31"

signals:
  entry:
    - "Price breaks above the 20-day high by 3%"
    - "Volume is 150% of the 20-day average volume"
  exit:
    - "Price drops 8% below entry price"
    - "Holding period exceeds 15 bars"

risk_management:
  stop_loss: 0.08
  position_sizing: "10% of portfolio equity per trade"
  leverage: 5.0          # ERROR SVR-E025: leverage > 4
  max_positions: 3
  risk_per_trade_pct: 0.02

acceptance_criteria:
  max_drawdown_pct: 25.0
  min_sharpe_ratio: 1.0
  min_profit_factor: 1.2
  min_trades: 100
  min_cagr: 10.0

assumptions:
  fees: 0.001
  slippage: 0.001

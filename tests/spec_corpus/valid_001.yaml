metadata:
  name: "Golden Cross Momentum"
  version: "1.0.0"
  author: "Jane Doe"
  created_at: "2026-01-15"
  description: >
    A classic golden-cross momentum strategy that goes long when the 50-day SMA
    crosses above the 200-day SMA and exits when the 50-day SMA crosses below.
    Designed for S&P 500 constituents on daily bars.

strategy:
  type: "momentum"

  universe:
    symbols:
      - "AAPL"
      - "MSFT"
      - "GOOGL"
    resolution: "daily"
    market: "equities"

  signals:
    entry:
      conditions:
        - "50-day SMA crosses above 200-day SMA"
        - "RSI(14) < 70"
      logic: "AND"
    exit:
      conditions:
        - "50-day SMA crosses below 200-day SMA"
        - "RSI(14) > 80"
      logic: "OR"

  risk_management:
    position_sizing: "percentage"
    max_position_size: 0.10
    stop_loss: 0.05
    take_profit: 0.15
    max_drawdown: 0.20
    max_leverage: 1.0

  performance_targets:
    sharpe_ratio_min: 1.2
    win_rate_min: 0.55
    max_drawdown_threshold: 0.20

  backtesting:
    start_date: "2015-01-01"
    end_date: "2024-12-31"
    initial_capital: 100000
    min_trades: 200
    benchmark: "SPY"

  data_requirements:
    resolution: "daily"
    min_history_days: 504
    indicators:
      - "SMA(50)"
      - "SMA(200)"
      - "RSI(14)"

# valid_001.yaml — Day-trade strategy with all required fields.
# Expected: zero errors, zero warnings.

metadata:
  name: "VWAP Reversion Day Trade"
  trading_style: "day_trade"
  description: >
    A day trading strategy that fades intraday VWAP deviations on high-volume
    large-cap stocks. Enters long when price deviates more than 1.5% below VWAP
    with elevated volume confirmation, exits when price returns to VWAP or after
    45 minutes, whichever comes first.
  author: "Jane Doe"
  version: "1.0.0"

capital:
  allocation_usd: 50000

constraints:
  max_holding_minutes: 60
  close_eod: true

data:
  instruments:
    - "AAPL"
    - "MSFT"
    - "TSLA"
  resolution: "minute"
  start_date: "2019-01-01"
  end_date: "2024-12-31"

signals:
  entry:
    - "Price deviates more than 1.5% below VWAP with volume > 2x 20-period average"
    - "RSI(5) < 30 on 1-minute chart"
  exit:
    - "Price returns within 0.3% of VWAP"
    - "Time since entry > 45 minutes"
    - "Stop-loss at 0.5% below entry price"

risk_management:
  stop_loss:
    pct: 0.005
    atr_multiplier: 1.5
  position_sizing: "1% of account equity per trade, max 3 positions simultaneously"
  leverage: 1.0
  max_positions: 3
  risk_per_trade_pct: 0.01

acceptance_criteria:
  max_drawdown_pct: 10.0
  min_sharpe_ratio: 1.5
  min_profit_factor: 1.5
  min_trades: 300
  min_cagr: 25.0

assumptions:
  fees: 0.001
  slippage: 0.0005

notes: "Strategy runs during regular NYSE trading hours only (9:30–16:00 ET)."

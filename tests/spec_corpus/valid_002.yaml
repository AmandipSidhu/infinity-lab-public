# valid_002.yaml — Swing trading strategy with all required fields.
# Expected: zero errors, zero warnings.

metadata:
  name: "52-Week High Breakout Swing"
  trading_style: "swing"
  description: >
    A swing trading strategy that buys breakouts above the 52-week high when
    confirmed by elevated volume. Positions are held for two to twenty trading
    days and closed via a fixed-percentage stop or a time-based exit. Designed
    for liquid large- and mid-cap US equities on daily bars.
  author: "John Smith"
  version: "2.0.0"

capital:
  allocation_pct: 0.25

data:
  instruments:
    - "SPY"
    - "QQQ"
    - "IWM"
  resolution: "daily"
  start_date: "2015-01-01"
  end_date: "2024-12-31"

signals:
  entry:
    - "Price closes above the 52-week high by more than 2%"
    - "Volume on breakout day is at least 1.5x the 20-day average volume"
    - "RSI(14) > 55 and RSI(14) < 75"
  exit:
    - "Price falls more than 8% below entry price (hard stop)"
    - "Holding period exceeds 20 bars"
    - "RSI(14) > 80 (profit-taking)"

risk_management:
  stop_loss:
    pct: 0.08
    atr_multiplier: 2.0
  position_sizing: "Fixed fractional 2% of portfolio equity per trade"
  leverage: 1.0
  max_positions: 5
  risk_per_trade_pct: 0.02

acceptance_criteria:
  max_drawdown_pct: 20.0
  min_sharpe_ratio: 1.2
  min_profit_factor: 1.4
  min_trades: 150
  min_cagr: 15.0

assumptions:
  fees: 0.0005
  slippage: 0.001

notes: "Swing trades are held for two to twenty calendar days."

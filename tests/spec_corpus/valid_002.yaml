metadata:
  name: "RSI Mean Reversion"
  version: "2.1.0"
  author: "John Smith"
  created_at: "2025-11-01"
  description: >
    A mean-reversion strategy using RSI oversold/overbought signals on
    large-cap equities. Enters long when RSI(14) drops below 30 and exits
    when RSI(14) recovers above 55. Uses tight position sizing and stop-loss
    to control downside risk.

strategy:
  type: "mean_reversion"

  universe:
    symbols:
      - "SPY"
      - "QQQ"
      - "IWM"
      - "DIA"
    resolution: "daily"
    market: "equities"

  signals:
    entry:
      conditions:
        - "RSI(14) < 30"
        - "price is above 200-day SMA"
      logic: "AND"
    exit:
      conditions:
        - "RSI(14) > 55"
        - "stop-loss at 3% below entry price"
      logic: "OR"

  risk_management:
    position_sizing: "volatility_adjusted"
    max_position_size: 0.08
    stop_loss: 0.03
    take_profit: 0.09
    max_drawdown: 0.15
    max_leverage: 1.0

  performance_targets:
    sharpe_ratio_min: 1.5
    win_rate_min: 0.60
    max_drawdown_threshold: 0.15

  backtesting:
    start_date: "2018-01-01"
    end_date: "2024-06-30"
    initial_capital: 250000
    min_trades: 500
    benchmark: "SPY"

  data_requirements:
    resolution: "daily"
    min_history_days: 252
    indicators:
      - "RSI(14)"
      - "SMA(200)"
      - "ATR(14)"

name: ACB Pipeline

on:
  push:
    paths:
      - "specs/**"
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Path to the spec file to validate (e.g. specs/my_strategy.yaml)"
        required: false
        default: ""

jobs:
  detect-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix_specs: ${{ steps.get-specs.outputs.matrix_specs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed spec files
        id: get-specs
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.spec_file }}" ]; then
            SPECS_JSON=$(jq -cn --arg s "${{ inputs.spec_file }}" '[\$s]')
          else
            SPECS_JSON=$(git diff --name-only HEAD~1 HEAD -- 'specs/**' | jq -Rcn '[inputs]')
          fi
          if [ "$SPECS_JSON" = "[]" ]; then
            echo "::error::No spec files found in specs/ for this push"
            exit 1
          fi
          echo "matrix_specs=$SPECS_JSON" >> "$GITHUB_OUTPUT"
          echo "Found spec files: $SPECS_JSON"

  acb-pipeline:
    needs: detect-specs
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        spec_file: ${{ fromJson(needs.detect-specs.outputs.matrix_specs) }}

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'constraints.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        id: install-deps
        run: pip install -r requirements.txt -c constraints.txt

      - name: Validate spec
        id: validate
        run: |
          python scripts/spec_validator.py --spec "${{ matrix.spec_file }}"

      - name: Review strategy
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/strategy_reviewer.py \
            --spec "${{ matrix.spec_file }}" \
            --output /tmp/reviewer_output.json

      - name: Post reviewer results to step summary
        id: evaluate
        run: |
          python - <<'PYEOF'
          import json
          import os

          with open("/tmp/reviewer_output.json", encoding="utf-8") as fh:
              data = json.load(fh)

          verdict = data.get("verdict", "PASS")
          risk_level = data.get("risk_level", "low")
          concerns = data.get("concerns", [])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as s:
              s.write("## Strategy Reviewer Results\n\n")
              s.write(f"**Spec file**: `{data.get('spec_file', 'unknown')}`\n\n")
              s.write(f"**Verdict**: {verdict}\n\n")
              s.write(f"**Risk level**: {risk_level}\n\n")
              if concerns:
                  s.write(f"### ⚠️ Warnings ({len(concerns)}) — review before next iteration\n\n")
                  for i, concern in enumerate(concerns, 1):
                      s.write(f"{i}. {concern}\n")
              else:
                  s.write("No warnings — strategy review passed cleanly.\n")
          PYEOF

      - name: Aider build
        id: aider-build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/aider_builder.py \
            --spec "${{ matrix.spec_file }}"

      - name: Compute spec name
        id: spec-name
        if: always()
        run: |
          SPEC_NAME=$(python -c "import pathlib; print(pathlib.Path('${{ matrix.spec_file }}').stem)")
          echo "spec_name=${SPEC_NAME}" >> "$GITHUB_OUTPUT"

      - name: Pre-commit quality gates
        id: pre-commit-gates
        run: |
          python scripts/pre_commit_gates.py \
            --strategy "strategies/${{ steps.spec-name.outputs.spec_name }}.py" \
            --output /tmp/pre_commit_gates_output.json

      - name: QC Upload and Backtest
        id: qc-upload-eval
        env:
          QC_USER_ID: ${{ secrets.QC_USER_ID }}
          QC_API_TOKEN: ${{ secrets.QC_API_TOKEN }}
        run: |
          python scripts/qc_upload_eval.py \
            --spec "${{ matrix.spec_file }}" \
            --strategy "strategies/${{ steps.spec-name.outputs.spec_name }}.py" \
            --output /tmp/qc_eval_output.json

      - name: Human review and artifacts
        id: human-review
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/human_review_artifacts.py \
            --spec "${{ matrix.spec_file }}" \
            --pre-commit-output /tmp/pre_commit_gates_output.json \
            --qc-output /tmp/qc_eval_output.json

      - name: Upload evaluation artifacts
        id: upload-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-artifacts-${{ steps.spec-name.outputs.spec_name }}
          path: |
            /tmp/pre_commit_gates_output.json
            /tmp/qc_eval_output.json
          if-no-files-found: warn

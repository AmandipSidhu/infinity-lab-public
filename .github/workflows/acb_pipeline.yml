name: ACB Pipeline

on:
  push:
    paths:
      - "specs/**"
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Path to the spec file to validate (e.g. specs/my_strategy.yaml)"
        required: false
        default: ""

jobs:
  detect-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix_specs: ${{ steps.get-specs.outputs.matrix_specs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed spec files
        id: get-specs
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.spec_file }}" ]; then
            SPECS_JSON=$(jq -cn --arg s "${{ inputs.spec_file }}" '[$s]')
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            # Determine a reliable base commit for the diff, handling edge cases:
            #   - all-zeros BEFORE: new branch first push, force push, or initial push
            #   - unreachable BEFORE: shallow-clone edge cases or cross-repo events
            fallback_base() {
              git fetch origin main --depth=1 2>/dev/null || echo "Warning: could not fetch origin/main" >&2
              local base
              if base=$(git merge-base HEAD origin/main 2>/dev/null); then
                echo "Using merge-base with origin/main as BASE" >&2
                echo "$base"
              elif base=$(git rev-parse HEAD~1 2>/dev/null); then
                echo "HEAD~1 not reachable from origin/main; using HEAD~1 as BASE" >&2
                echo "$base"
              else
                echo "No reachable parent found (initial commit?); will use empty-tree as BASE" >&2
                echo ""
              fi
            }
            if [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
              echo "github.event.before is absent or all-zeros; finding merge-base with origin/main"
              BASE=$(fallback_base)
            elif ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              echo "BEFORE commit $BEFORE not reachable; finding merge-base with origin/main"
              BASE=$(fallback_base)
            else
              BASE="$BEFORE"
            fi
            if [ -z "$BASE" ]; then
              # No reachable parent (initial commit); use git's well-known empty-tree SHA
              # so the diff lists all files added in the very first commit.
              BASE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
            fi
            # Use grep to match specs at any depth (avoids glob-depth issues with specs/**/*.yaml).
            # { ... || true; } prevents grep's exit code 1 (no match) from aborting via pipefail.
            SPECS_JSON=$(git diff --name-only "$BASE" "$AFTER" | { grep -E '^specs/.*\.ya?ml$' || true; } | jq -Rcn '[inputs]')
          fi
          if [ "$SPECS_JSON" = "[]" ]; then
            echo "No spec files changed in this push — skipping pipeline." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "Found spec files: $SPECS_JSON"
          fi
          echo "matrix_specs=$SPECS_JSON" >> "$GITHUB_OUTPUT"

  acb-pipeline:
    needs: detect-specs
    if: needs.detect-specs.outputs.matrix_specs != '[]'
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        spec_file: ${{ fromJson(needs.detect-specs.outputs.matrix_specs) }}

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate required secrets
        id: validate-secrets
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACK_CHANNEL_ID: ${{ secrets.SLACK_ACK_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QC_USER_ID: ${{ secrets.QC_USER_ID }}
          QC_API_TOKEN: ${{ secrets.QC_API_TOKEN }}
        run: |
          set -euo pipefail
          MISSING=()
          for var in SLACK_BOT_TOKEN SLACK_ACK_CHANNEL_ID GEMINI_API_KEY OPENAI_API_KEY ANTHROPIC_API_KEY QC_USER_ID QC_API_TOKEN; do
            if [ -z "${!var:-}" ]; then
              MISSING+=("$var")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::warning::Missing secrets: ${MISSING[*]} — secret-dependent steps will be skipped."
            echo "secrets_ok=false" >> "$GITHUB_OUTPUT"
            echo "missing_secrets=${MISSING[*]}" >> "$GITHUB_OUTPUT"
          else
            echo "All required secrets are present."
            echo "secrets_ok=true" >> "$GITHUB_OUTPUT"
            echo "missing_secrets=" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'constraints.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        id: install-deps
        run: python -m pip install -r requirements.txt -c constraints.txt

      - name: Install lean-cli
        id: install-lean
        run: python -m pip install lean

      - name: Verify dependencies
        id: verify-deps
        run: |
          python -c "import sys; print('Python', sys.version, sys.executable)"
          python -c "import requests; print('requests', requests.__version__)"
          python -m pip show requests

      - name: Notify - Spec Submitted (Gate 1)
        id: notify-spec-submitted
        if: steps.validate-secrets.outputs.secrets_ok == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACK_CHANNEL_ID: ${{ secrets.SLACK_ACK_CHANNEL_ID }}
        run: |
          python scripts/notify_slack.py \
            --event spec_submitted \
            --strategy "${{ matrix.spec_file }}" \
            --spec-path "${{ matrix.spec_file }}" \
            --linear-id "UNI-75" \
            --github-issue "${{ github.event.pull_request.number || 'N/A' }}"

      - name: Validate spec
        id: validate
        continue-on-error: true  # Don't halt pipeline; downstream steps handle the failure
        run: |
          python scripts/spec_validator.py \
            --spec "${{ matrix.spec_file }}" \
            --output /tmp/validation_output.json

      - name: Format validation results to Step Summary
        id: format-validation
        if: always()
        run: |
          python - <<'PYEOF'
          import json
          import os

          # Read validation output written by spec_validator.py
          try:
              with open("/tmp/validation_output.json", encoding="utf-8") as f:
                  result = json.load(f)
          except FileNotFoundError:
              print("Validation output not found, skipping summary")
              exit(0)

          # Write human-readable table to the GitHub Step Summary
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as s:
              if result["error_count"] > 0:
                  s.write("## ❌ Spec Validation Failed\n\n")
                  s.write(f"**Spec**: `{result['spec_file']}`\n\n")
                  s.write(f"**Errors**: {result['error_count']}\n\n")
                  s.write("| Code | Field | Message |\n")
                  s.write("|------|-------|---------|\n")
                  for finding in result.get("findings", []):
                      if finding["severity"] == "ERROR":
                          s.write(f"| `{finding['code']}` | `{finding['field']}` | {finding['message']} |\n")
              else:
                  s.write("## ✅ Spec Validation Passed\n\n")
                  s.write(f"**Spec**: `{result['spec_file']}`\n\n")

              # Always surface warnings when present
              if result["warning_count"] > 0:
                  s.write(f"\n### ⚠️ Warnings ({result['warning_count']})\n\n")
                  for finding in result.get("findings", []):
                      if finding["severity"] == "WARNING":
                          s.write(f"- **{finding['code']}** (`{finding['field']}`): {finding['message']}\n")
          PYEOF

      - name: Notify Slack on validation failure
        id: notify-validation-failure
        if: steps.validate.outcome == 'failure' && steps.validate-secrets.outputs.secrets_ok == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACK_CHANNEL_ID: ${{ secrets.SLACK_ACK_CHANNEL_ID }}
        run: |
          python - <<'PYEOF'
          import json
          import os
          import requests

          # Read validation output for error details
          try:
              with open("/tmp/validation_output.json", encoding="utf-8") as f:
                  result = json.load(f)
              error_summary = f"{result['error_count']} errors"
              # Show top 3 errors as bullet points in the Slack message
              errors_text = "\n".join([
                  f"• {f['code']}: {f['message']}"
                  for f in result.get("findings", [])[:3]
                  if f["severity"] == "ERROR"
              ])
          except Exception:
              error_summary = "Unknown errors"
              errors_text = "Could not load validation output"

          spec_file = "${{ matrix.spec_file }}"
          run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build Slack Block Kit message with header, fields, error list, and CTA button
          message = {
              "channel": os.environ["SLACK_ACK_CHANNEL_ID"],
              "text": "❌ ACB Pipeline: Spec validation failed",
              "blocks": [
                  {
                      "type": "header",
                      "text": {"type": "plain_text", "text": "❌ Spec Validation Failed"},
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Spec:*\n`{spec_file}`"},
                          {"type": "mrkdwn", "text": f"*Errors:*\n{error_summary}"},
                      ],
                  },
                  {
                      "type": "section",
                      "text": {"type": "mrkdwn", "text": f"*Top Errors:*\n{errors_text}"},
                  },
                  {
                      "type": "actions",
                      "elements": [
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "View Workflow Run"},
                              "url": run_url,
                          }
                      ],
                  },
              ],
          }

          response = requests.post(
              "https://slack.com/api/chat.postMessage",
              headers={"Authorization": f"Bearer {os.environ['SLACK_BOT_TOKEN']}"},
              json=message,
          )

          if not response.ok or not response.json().get("ok"):
              print(f"Slack notification failed: {response.text}")
              exit(1)
          PYEOF

      - name: Review strategy
        id: review
        if: steps.validate.outcome == 'success' && steps.validate-secrets.outputs.secrets_ok == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/strategy_reviewer.py \
            --spec "${{ matrix.spec_file }}" \
            --output /tmp/reviewer_output.json

      - name: Post reviewer results to step summary
        id: evaluate
        if: steps.review.outcome == 'success'
        run: |
          python - <<'PYEOF'
          import json
          import os

          with open("/tmp/reviewer_output.json", encoding="utf-8") as fh:
              data = json.load(fh)

          verdict = data.get("verdict", "PASS")
          risk_level = data.get("risk_level", "low")
          concerns = data.get("concerns", [])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as s:
              s.write("## Strategy Reviewer Results\n\n")
              s.write(f"**Spec file**: `{data.get('spec_file', 'unknown')}`\n\n")
              s.write(f"**Verdict**: {verdict}\n\n")
              s.write(f"**Risk level**: {risk_level}\n\n")
              if concerns:
                  s.write(f"### ⚠️ Warnings ({len(concerns)}) — review before next iteration\n\n")
                  for i, concern in enumerate(concerns, 1):
                      s.write(f"{i}. {concern}\n")
              else:
                  s.write("No warnings — strategy review passed cleanly.\n")
          PYEOF

      - name: Aider build
        id: aider-build
        if: steps.validate.outcome == 'success' && steps.validate-secrets.outputs.secrets_ok == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/aider_builder.py \
            --spec "${{ matrix.spec_file }}"

      - name: Compute spec name
        id: spec-name
        if: always()
        run: |
          SPEC_NAME=$(python -c "import pathlib; print(pathlib.Path('${{ matrix.spec_file }}').stem)")
          echo "spec_name=${SPEC_NAME}" >> "$GITHUB_OUTPUT"

      - name: Lean local backtest
        id: lean-backtest
        if: steps.aider-build.outcome == 'success'
        shell: bash
        run: |
          set +e
          lean backtest "strategies/${{ steps.spec-name.outputs.spec_name }}" \
            --output /tmp/lean_backtest_output 2>&1 | tee /tmp/lean_backtest.log
          LEAN_EXIT=${PIPESTATUS[0]}
          if [ $LEAN_EXIT -eq 0 ]; then
            RESULT_FILE=$(find /tmp/lean_backtest_output -name "*.json" -not -name "*order-events*" | head -1)
            if [ -n "$RESULT_FILE" ]; then
              cp "$RESULT_FILE" /tmp/backtest_result.json
            else
              echo '{"status":"success","output_missing":true}' > /tmp/backtest_result.json
            fi
          else
            echo "::warning::Lean backtest exited with code $LEAN_EXIT — see log below."
            echo "## Lean Backtest Error" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -50 /tmp/lean_backtest.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo '{"status":"failed","exit_code":'"$LEAN_EXIT"'}' > /tmp/backtest_result.json
          fi

      - name: Upload lean backtest result
        if: steps.aider-build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: lean-backtest-result-${{ steps.spec-name.outputs.spec_name }}
          path: /tmp/backtest_result.json
          if-no-files-found: warn

      - name: Pre-commit quality gates
        id: pre-commit-gates
        if: steps.aider-build.outcome == 'success'
        run: |
          python scripts/pre_commit_gates.py \
            --strategy "strategies/${{ steps.spec-name.outputs.spec_name }}.py" \
            --output /tmp/pre_commit_gates_${{ steps.spec-name.outputs.spec_name }}.json

      - name: Upload pre-commit gates results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-commit-gates-results-${{ steps.spec-name.outputs.spec_name }}
          path: /tmp/pre_commit_gates_${{ steps.spec-name.outputs.spec_name }}.json
          if-no-files-found: warn

      - name: Upload pre-commit gates output
        id: upload-pre-commit-gates-output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-commit-gates-output
          path: /tmp/pre_commit_gates_output.json
          if-no-files-found: warn

      - name: QC Upload and Backtest
        id: qc-upload-eval
        if: steps.aider-build.outcome == 'success'
        env:
          QC_MCP_BASE_URL: "http://localhost:8000/mcp"
          QC_USER_ID: ${{ secrets.QC_USER_ID }}
          QC_API_TOKEN: ${{ secrets.QC_API_TOKEN }}
        run: |
          python scripts/qc_upload_eval.py \
            --spec "${{ matrix.spec_file }}" \
            --strategy "strategies/${{ steps.spec-name.outputs.spec_name }}.py" \
            --output /tmp/qc_eval_output.json

      - name: Human review and artifacts
        id: human-review
        if: steps.install-deps.outcome == 'success' && steps.qc-upload-eval.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/human_review_artifacts.py \
            --spec "${{ matrix.spec_file }}" \
            --pre-commit-output /tmp/pre_commit_gates_${{ steps.spec-name.outputs.spec_name }}.json \
            --qc-output /tmp/qc_eval_output.json

      - name: Upload evaluation artifacts
        id: upload-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-artifacts-${{ steps.spec-name.outputs.spec_name }}
          path: |
            /tmp/pre_commit_gates_${{ steps.spec-name.outputs.spec_name }}.json
            /tmp/qc_eval_output.json
          if-no-files-found: warn

      - name: Notify Slack on pipeline completion
        id: notify-pipeline-completion
        if: always() && steps.validate-secrets.outputs.secrets_ok == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACK_CHANNEL_ID: ${{ secrets.SLACK_ACK_CHANNEL_ID }}
        run: |
          python - <<'PYEOF'
          import os
          import requests

          # Determine overall pipeline status from key step outcomes
          validate_outcome = "${{ steps.validate.outcome }}"
          aider_outcome = "${{ steps.aider-build.outcome }}"
          qc_outcome = "${{ steps.qc-upload-eval.outcome }}"

          if validate_outcome == "failure":
              status_emoji = "❌"
              status_text = "Validation Failed"
          elif aider_outcome == "failure":
              status_emoji = "⚠️"
              status_text = "Aider Build Failed"
          elif qc_outcome == "failure":
              status_emoji = "⚠️"
              status_text = "QC Backtest Failed"
          elif aider_outcome == "success" and qc_outcome == "success":
              status_emoji = "✅"
              status_text = "Pipeline Completed Successfully"
          else:
              status_emoji = "⏭️"
              status_text = "Pipeline Completed (Some Steps Skipped)"

          spec_file = "${{ matrix.spec_file }}"
          run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build Slack Block Kit message summarizing the full pipeline run
          message = {
              "channel": os.environ["SLACK_ACK_CHANNEL_ID"],
              "text": f"{status_emoji} ACB Pipeline: {status_text}",
              "blocks": [
                  {
                      "type": "header",
                      "text": {"type": "plain_text", "text": f"{status_emoji} {status_text}"},
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Spec:*\n`{spec_file}`"},
                          {"type": "mrkdwn", "text": f"*Run ID:*\n`${{ github.run_id }}`"},
                      ],
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"*Step Outcomes:*\n"
                              f"• Validate: {validate_outcome}\n"
                              f"• Aider Build: {aider_outcome or 'skipped'}\n"
                              f"• QC Backtest: {qc_outcome or 'skipped'}"
                          ),
                      },
                  },
                  {
                      "type": "actions",
                      "elements": [
                          {
                              "type": "button",
                              "text": {"type": "plain_text", "text": "View Workflow Run"},
                              "url": run_url,
                          }
                      ],
                  },
              ],
          }

          response = requests.post(
              "https://slack.com/api/chat.postMessage",
              headers={"Authorization": f"Bearer {os.environ['SLACK_BOT_TOKEN']}"},
              json=message,
          )

          if not response.ok or not response.json().get("ok"):
              # Notification failure should not block the pipeline
              print(f"Slack notification failed: {response.text}")
          PYEOF

      - name: E2E Step Report
        id: e2e-report
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PYEOF'
          import datetime
          import os
          import pathlib

          spec_file = "${{ matrix.spec_file }}"
          spec_stem = pathlib.Path(spec_file).stem
          run_id = os.environ.get("GITHUB_RUN_ID", "unknown")
          attempt = os.environ.get("GITHUB_RUN_ATTEMPT", "1")
          timestamp = datetime.datetime.utcnow().strftime("%Y%m%dT%H%M%SZ")

          report_dir = pathlib.Path("reports/e2e") / spec_stem
          report_dir.mkdir(parents=True, exist_ok=True)
          report_path = report_dir / f"{timestamp}-run-{run_id}-attempt-{attempt}.md"

          secrets_ok = "${{ steps.validate-secrets.outputs.secrets_ok }}"
          missing_secrets = "${{ steps.validate-secrets.outputs.missing_secrets }}"

          steps_data = [
              ("checkout",                   "Checkout repository",                    "${{ steps.checkout.outcome }}"),
              ("validate-secrets",           "Validate required secrets",              "${{ steps.validate-secrets.outcome }}"),
              ("setup-python",               "Set up Python 3.11",                     "${{ steps.setup-python.outcome }}"),
              ("cache-pip",                  "Cache pip dependencies",                 "${{ steps.cache-pip.outcome }}"),
              ("install-deps",               "Install dependencies",                   "${{ steps.install-deps.outcome }}"),
              ("verify-deps",                "Verify dependencies",                    "${{ steps.verify-deps.outcome }}"),
              ("notify-spec-submitted",      "Notify Slack - Spec Submitted (Gate 1)", "${{ steps.notify-spec-submitted.outcome }}"),
              ("validate",                   "Validate spec",                          "${{ steps.validate.outcome }}"),
              ("format-validation",          "Format validation results to summary",   "${{ steps.format-validation.outcome }}"),
              ("notify-validation-failure",  "Notify Slack on validation failure",     "${{ steps.notify-validation-failure.outcome }}"),
              ("review",                     "Review strategy",                        "${{ steps.review.outcome }}"),
              ("evaluate",                   "Post reviewer results",                  "${{ steps.evaluate.outcome }}"),
              ("aider-build",                "Aider build",                            "${{ steps.aider-build.outcome }}"),
              ("spec-name",                  "Compute spec name",                      "${{ steps.spec-name.outcome }}"),
              ("pre-commit-gates",           "Pre-commit quality gates",               "${{ steps.pre-commit-gates.outcome }}"),
              ("qc-upload-eval",             "QC Upload and Backtest",                 "${{ steps.qc-upload-eval.outcome }}"),
              ("human-review",               "Human review and artifacts",             "${{ steps.human-review.outcome }}"),
              ("upload-artifacts",           "Upload evaluation artifacts",            "${{ steps.upload-artifacts.outcome }}"),
              ("notify-pipeline-completion", "Notify Slack on pipeline completion",    "${{ steps.notify-pipeline-completion.outcome }}"),
          ]

          icons = {
              "success":   "✅",
              "failure":   "❌",
              "skipped":   "⏭️",
              "cancelled": "🚫",
          }

          lines = [
              "# ACB Pipeline E2E Run Report",
              "",
              "| Field | Value |",
              "|-------|-------|",
              f"| **Spec** | `{spec_file}` |",
              f"| **Run ID** | `{run_id}` |",
              f"| **Attempt** | `{attempt}` |",
              f"| **Timestamp (UTC)** | `{timestamp}` |",
              f"| **Secrets present** | `{secrets_ok or 'unknown'}` |",
              "",
          ]

          if missing_secrets and missing_secrets.strip():
              lines += [
                  "## ⚠️ Missing Secrets",
                  "",
                  "The following secrets were absent — their dependent steps were skipped:",
                  "",
              ]
              for s in missing_secrets.split():
                  lines.append(f"- `{s}`")
              lines.append("")

          lines += [
              "## Step Outcomes",
              "",
              "| Step | Name | Outcome |",
              "|------|------|---------|",
          ]
          for step_id, step_name, outcome in steps_data:
              icon = icons.get(outcome, "❓")
              lines.append(f"| `{step_id}` | {step_name} | {icon} {outcome or 'unknown'} |")
          lines.append("")

          report_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"E2E report written to: {report_path}")
          PYEOF

          # Commit and push the report back to the branch (best-effort)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/e2e/
          if git diff --cached --quiet; then
            echo "No new report to commit."
          else
            git commit -m "ci: add E2E report for ${{ matrix.spec_file }} [run ${{ github.run_id }} attempt ${{ github.run_attempt }}]"
            git push || echo "::warning::Could not push E2E report — report exists in the workflow artifacts only."
          fi

      - name: Test Slack Notification (send Hi)
        if: steps.validate-secrets.outputs.secrets_ok == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACK_CHANNEL_ID: ${{ secrets.SLACK_ACK_CHANNEL_ID }}
        run: |
          python scripts/notify_slack.py --test

name: ACB Pipeline

on:
  push:
    paths:
      - "specs/**"
  workflow_dispatch:
    inputs:
      spec_file:
        description: "Path to the spec file to validate (e.g. specs/my_strategy.yaml)"
        required: false
        default: ""

jobs:
  detect-specs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix_specs: ${{ steps.get-specs.outputs.matrix_specs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed spec files
        id: get-specs
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.spec_file }}" ]; then
            SPECS_JSON=$(jq -cn --arg s "${{ inputs.spec_file }}" '[\$s]')
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            SPECS_JSON=$(git diff --name-only "$BEFORE" "$AFTER" -- 'specs/**/*.yaml' 'specs/**/*.yml' | jq -Rcn '[inputs]')
          fi
          if [ "$SPECS_JSON" = "[]" ]; then
            echo "::error::No spec files found in specs/ for this push"
            exit 1
          fi
          echo "matrix_specs=$SPECS_JSON" >> "$GITHUB_OUTPUT"
          echo "Found spec files: $SPECS_JSON"

  acb-pipeline:
    needs: detect-specs
    runs-on: ubuntu-latest
    continue-on-error: false
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        spec_file: ${{ fromJson(needs.detect-specs.outputs.matrix_specs) }}

    steps:
      - name: Checkout repository
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Validate required secrets
        id: validate-secrets
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACK_CHANNEL_ID: ${{ secrets.SLACK_ACK_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          QC_USER_ID: ${{ secrets.QC_USER_ID }}
          QC_API_TOKEN: ${{ secrets.QC_API_TOKEN }}
        run: |
          set -euo pipefail
          MISSING=()
          for var in SLACK_BOT_TOKEN SLACK_ACK_CHANNEL_ID GEMINI_API_KEY OPENAI_API_KEY ANTHROPIC_API_KEY QC_USER_ID QC_API_TOKEN; do
            if [ -z "${!var:-}" ]; then
              MISSING+=("$var")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'constraints.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        id: install-deps
        run: python -m pip install -r requirements.txt -c constraints.txt

      - name: Verify dependencies
        id: verify-deps
        run: |
          python -c "import sys; print('Python', sys.version, sys.executable)"
          python -c "import requests; print('requests', requests.__version__)"
          python -m pip show requests

      - name: Validate spec
        id: validate
        run: |
          python scripts/spec_validator.py --spec "${{ matrix.spec_file }}"

      - name: Slack receipt acknowledgment
        id: slack-ack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACK_CHANNEL_ID: ${{ secrets.SLACK_ACK_CHANNEL_ID }}
        run: |
          python - <<'PYEOF'
          import os
          import sys
          sys.path.insert(0, "scripts")
          import slack_api
          spec_file = "${{ matrix.spec_file }}"
          channel = os.environ["SLACK_ACK_CHANNEL_ID"]
          text = f":rocket: ACB Pipeline started for spec `{spec_file}` — build in progress."
          slack_api.post_message(channel, text)
          print(f"Slack ack posted to {channel}")
          PYEOF

      - name: Review strategy
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/strategy_reviewer.py \
            --spec "${{ matrix.spec_file }}" \
            --output /tmp/reviewer_output.json

      - name: Post reviewer results to step summary
        id: evaluate
        run: |
          python - <<'PYEOF'
          import json
          import os

          with open("/tmp/reviewer_output.json", encoding="utf-8") as fh:
              data = json.load(fh)

          verdict = data.get("verdict", "PASS")
          risk_level = data.get("risk_level", "low")
          concerns = data.get("concerns", [])

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as s:
              s.write("## Strategy Reviewer Results\n\n")
              s.write(f"**Spec file**: `{data.get('spec_file', 'unknown')}`\n\n")
              s.write(f"**Verdict**: {verdict}\n\n")
              s.write(f"**Risk level**: {risk_level}\n\n")
              if concerns:
                  s.write(f"### ⚠️ Warnings ({len(concerns)}) — review before next iteration\n\n")
                  for i, concern in enumerate(concerns, 1):
                      s.write(f"{i}. {concern}\n")
              else:
                  s.write("No warnings — strategy review passed cleanly.\n")
          PYEOF

      - name: Aider build
        id: aider-build
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/aider_builder.py \
            --spec "${{ matrix.spec_file }}"

      - name: Compute spec name
        id: spec-name
        if: always()
        run: |
          SPEC_NAME=$(python -c "import pathlib; print(pathlib.Path('${{ matrix.spec_file }}').stem)")
          echo "spec_name=${SPEC_NAME}" >> "$GITHUB_OUTPUT"

      - name: Pre-commit quality gates
        id: pre-commit-gates
        run: |
          python scripts/pre_commit_gates.py \
            --strategy "strategies/${{ steps.spec-name.outputs.spec_name }}.py" \
            --output /tmp/pre_commit_gates_output.json

      - name: QC Upload and Backtest
        id: qc-upload-eval
        env:
          QC_USER_ID: ${{ secrets.QC_USER_ID }}
          QC_API_TOKEN: ${{ secrets.QC_API_TOKEN }}
        run: |
          python scripts/qc_upload_eval.py \
            --spec "${{ matrix.spec_file }}" \
            --strategy "strategies/${{ steps.spec-name.outputs.spec_name }}.py" \
            --output /tmp/qc_eval_output.json

      - name: Human review and artifacts
        id: human-review
        if: steps.install-deps.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/human_review_artifacts.py \
            --spec "${{ matrix.spec_file }}" \
            --pre-commit-output /tmp/pre_commit_gates_output.json \
            --qc-output /tmp/qc_eval_output.json

      - name: Upload evaluation artifacts
        id: upload-artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-artifacts-${{ steps.spec-name.outputs.spec_name }}
          path: |
            /tmp/pre_commit_gates_output.json
            /tmp/qc_eval_output.json
          if-no-files-found: warn

      - name: E2E Step Report
        id: e2e-report
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PYEOF'
          import json
          import os
          import sys
          import urllib.request

          spec_file = "${{ matrix.spec_file }}"
          run_url = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          repo = "${{ github.repository }}"
          token = os.environ.get("GITHUB_TOKEN", "")

          steps_info = [
              (1,  "detect-specs / get-specs", "${{ needs.detect-specs.result }}",              ".github/workflows/acb_pipeline.yml"),
              (2,  "checkout",                 "${{ steps.checkout.outcome }}",                 ".github/workflows/acb_pipeline.yml"),
              (3,  "validate-secrets",         "${{ steps.validate-secrets.outcome }}",         ".github/workflows/acb_pipeline.yml"),
              (4,  "setup-python",             "${{ steps.setup-python.outcome }}",             ".github/workflows/acb_pipeline.yml"),
              (5,  "cache-pip",                "${{ steps.cache-pip.outcome }}",                ".github/workflows/acb_pipeline.yml"),
              (6,  "install-deps",             "${{ steps.install-deps.outcome }}",             "requirements.txt"),
              (7,  "verify-deps",              "${{ steps.verify-deps.outcome }}",              "requirements.txt"),
              (8,  "validate",                 "${{ steps.validate.outcome }}",                 "scripts/spec_validator.py"),
              (9,  "slack-ack",                "${{ steps.slack-ack.outcome }}",                ".github/workflows/acb_pipeline.yml"),
              (10, "review",                   "${{ steps.review.outcome }}",                   "scripts/strategy_reviewer.py"),
              (11, "evaluate",                 "${{ steps.evaluate.outcome }}",                 "scripts/strategy_reviewer.py"),
              (12, "aider-build",              "${{ steps.aider-build.outcome }}",              "scripts/aider_builder.py"),
              (13, "spec-name",                "${{ steps.spec-name.outcome }}",                ".github/workflows/acb_pipeline.yml"),
              (14, "pre-commit-gates",         "${{ steps.pre-commit-gates.outcome }}",         "scripts/pre_commit_gates.py"),
              (15, "qc-upload-eval",           "${{ steps.qc-upload-eval.outcome }}",           "scripts/qc_upload_eval.py"),
              (16, "human-review",             "${{ steps.human-review.outcome }}",             "scripts/human_review_artifacts.py"),
              (17, "upload-artifacts",         "${{ steps.upload-artifacts.outcome }}",         ".github/workflows/acb_pipeline.yml"),
          ]

          artifact_paths = [
              "/tmp/reviewer_output.json",
              "/tmp/pre_commit_gates_output.json",
              "/tmp/qc_eval_output.json",
          ]

          def outcome_label(outcome: str) -> str:
              if outcome == "success":
                  return "✅ PASS"
              elif outcome == "failure":
                  return "❌ FAIL"
              elif outcome == "skipped":
                  return "⏭️ SKIPPED"
              elif outcome == "cancelled":
                  return "🚫 CANCELLED"
              else:
                  return f"⚠️ {outcome.upper()}"

          lines = ["## E2E Step Report", ""]
          lines.append(f"**Spec**: `{spec_file}`")
          lines.append(f"**Run**: [{run_url}]({run_url})")
          lines.append("")
          lines.append("| # | Step | Result | Likely Fix |")
          lines.append("|---|------|--------|------------|")
          for num, step_name, outcome, fix_file in steps_info:
              label = outcome_label(outcome)
              fix_col = f"`{fix_file}`" if outcome == "failure" else ""
              lines.append(f"| {num} | `{step_name}` | {label} | {fix_col} |")
          lines.append("")
          lines.append("### Artifacts")
          for path in artifact_paths:
              exists = os.path.isfile(path)
              status = "✅ present" if exists else "❌ not found"
              lines.append(f"- `{path}`: {status}")

          report = "\n".join(lines) + "\n"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as fh:
              fh.write(report)
          print(report)

          if not token:
              print("No GITHUB_TOKEN — skipping PR comment.")
              sys.exit(0)

          branch = "${{ github.ref_name }}"
          repo_parts = repo.split("/", 1)
          if len(repo_parts) != 2:
              print(f"Unexpected repo format: {repo!r} — skipping PR comment.")
              sys.exit(0)
          owner = repo_parts[0]
          api_url = (
              f"https://api.github.com/repos/{repo}/pulls"
              f"?state=open&head={owner}:{branch}&per_page=10"
          )
          req = urllib.request.Request(
              api_url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          pr_number = None
          try:
              with urllib.request.urlopen(req) as resp:
                  pulls = json.loads(resp.read())
                  if pulls:
                      pr_number = pulls[0]["number"]
          except Exception as exc:
              print(f"Warning: could not fetch PR list: {exc}")

          if not pr_number:
              print("No open PR found for this branch — skipping PR comment.")
              sys.exit(0)

          comment_body = json.dumps({"body": f"<!-- e2e-step-report -->\n{report}"})
          comment_req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=comment_body.encode(),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(comment_req) as resp:
                  print(f"PR comment posted to PR #{pr_number}: HTTP {resp.status}")
          except Exception as exc:
              print(f"Warning: could not post PR comment: {exc}")
          PYEOF

name: GATE-0 QC MCP Verify

on:
  workflow_dispatch:

jobs:
  verify-qc-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install quantconnect-mcp
        run: pip install quantconnect-mcp

      - name: Start QC MCP Server
        env:
          QUANTCONNECT_USER_ID: ${{ secrets.QC_USER_ID }}
          QUANTCONNECT_API_TOKEN: ${{ secrets.QC_API_TOKEN }}
          MCP_TRANSPORT: streamable-http
          MCP_HOST: 0.0.0.0
          MCP_PORT: "8000"
        run: |
          quantconnect-mcp &
          echo "Waiting for MCP server to be ready..."
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 \
              -X POST http://localhost:8000/mcp/ \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":-1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"probe","version":"1.0"}}}' \
              2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
              echo "MCP server is ready after ${i}s (HTTP $HTTP_STATUS)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "GATE 0 FAIL: MCP server did not become ready within 30 seconds (last HTTP status: $HTTP_STATUS)"
              exit 1
            fi
            sleep 1
          done

      - name: Gate 0 — All Five Criteria (Python urllib)
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys
          import time
          import urllib.error
          import urllib.request

          MCP_URL = "http://localhost:8000/mcp/"
          BACKTEST_ID = "29a044c64e018d411830f0580ae25dee"
          PROJECT_ID = 28779543
          TIMING_LIMIT_S = 10.0

          STEP_SUMMARY = os.environ.get("GITHUB_STEP_SUMMARY", "")

          def summary(text: str) -> None:
              print(text)
              if STEP_SUMMARY:
                  with open(STEP_SUMMARY, "a") as fh:
                      fh.write(text + "\n")

          def mcp_post(payload: dict, session_id: str | None = None) -> tuple[dict, str | None]:
              """POST a JSON-RPC payload; return (parsed_response, session_id_from_header)."""
              body = json.dumps(payload).encode()
              headers: dict[str, str] = {
                  "Content-Type": "application/json",
                  "Accept": "application/json, text/event-stream",
              }
              if session_id:
                  headers["Mcp-Session-Id"] = session_id
              req = urllib.request.Request(MCP_URL, data=body, headers=headers, method="POST")
              with urllib.request.urlopen(req, timeout=20) as resp:
                  raw = resp.read().decode()
                  sid = resp.headers.get("Mcp-Session-Id")
              for line in raw.splitlines():
                  if line.startswith("data: "):
                      return json.loads(line[6:]), sid
              return json.loads(raw), sid

          def tool_call(
              name: str, arguments: dict, session_id: str, req_id: int = 1
          ) -> dict:
              resp, _ = mcp_post(
                  {
                      "jsonrpc": "2.0",
                      "id": req_id,
                      "method": "tools/call",
                      "params": {"name": name, "arguments": arguments},
                  },
                  session_id=session_id,
              )
              return resp

          def extract_tool_text(response: dict) -> str:
              content = response.get("result", {}).get("content", [])
              return "".join(
                  item.get("text", "")
                  for item in content
                  if isinstance(item, dict) and item.get("type") == "text"
              )

          def parse_tool_json(response: dict, label: str) -> dict:
              text = extract_tool_text(response)
              try:
                  return json.loads(text)
              except json.JSONDecodeError as exc:
                  print(f"GATE 0 FAIL [{label}]: response not valid JSON — {exc}")
                  print(f"  raw text: {text!r}")
                  sys.exit(1)

          def find_sharpe(obj: dict) -> str | None:
              """Search common locations in the backtest object for Sharpe Ratio."""
              for container in (
                  obj,
                  obj.get("Statistics") or {},
                  obj.get("statistics") or {},
                  obj.get("result") or {},
                  (obj.get("result") or {}).get("Statistics") or {},
                  (obj.get("result") or {}).get("statistics") or {},
              ):
                  if not isinstance(container, dict):
                      continue
                  for key in ("Sharpe Ratio", "SharpeRatio", "sharpeRatio", "sharpe_ratio"):
                      val = container.get(key)
                      if val is not None:
                          return str(val)
              return None

          def find_total_orders(obj: dict) -> int:
              """Extract Total Orders count from statistics."""
              for container in (
                  obj.get("Statistics") or {},
                  obj.get("statistics") or {},
                  (obj.get("result") or {}).get("Statistics") or {},
                  (obj.get("result") or {}).get("statistics") or {},
              ):
                  if not isinstance(container, dict):
                      continue
                  for key in ("Total Orders", "TotalOrders", "totalOrders"):
                      val = container.get(key)
                      if val is not None:
                          try:
                              return int(val)
                          except (ValueError, TypeError):
                              pass
              return 0

          summary("## Gate 0 — QC MCP Verification\n")

          # ------------------------------------------------------------------ #
          # Criterion 1: MCP starts in HTTP mode and returns a session ID       #
          # ------------------------------------------------------------------ #
          init_resp, session_id = mcp_post(
              {
                  "jsonrpc": "2.0",
                  "id": 0,
                  "method": "initialize",
                  "params": {
                      "protocolVersion": "2024-11-05",
                      "capabilities": {},
                      "clientInfo": {"name": "gate0", "version": "1.0"},
                  },
              }
          )
          if not session_id:
              print("GATE 0 FAIL [criterion-1]: initialize did not return Mcp-Session-Id header")
              sys.exit(1)
          summary(f"✅ **Criterion 1 PASS** — MCP running in streamable-http mode (session={session_id})")

          # ------------------------------------------------------------------ #
          # Criterion 2: validate_quantconnect_auth returns success             #
          # ------------------------------------------------------------------ #
          auth_resp = tool_call("validate_quantconnect_auth", {}, session_id, req_id=1)
          auth_result = parse_tool_json(auth_resp, "validate_quantconnect_auth")
          if not auth_result.get("authenticated", False):
              print(f"GATE 0 FAIL [criterion-2]: authenticated=false — {auth_result}")
              sys.exit(1)
          summary("✅ **Criterion 2 PASS** — validate_quantconnect_auth returned authenticated=true")

          # ------------------------------------------------------------------ #
          # Criteria 3 & 4 — timed together (must complete in < 10 s)          #
          # ------------------------------------------------------------------ #
          t0 = time.monotonic()

          # Criterion 3: read_backtest returns Sharpe ~0.436
          bt_resp = tool_call(
              "read_backtest",
              {"project_id": PROJECT_ID, "backtest_id": BACKTEST_ID},
              session_id,
              req_id=2,
          )
          bt_result = parse_tool_json(bt_resp, "read_backtest")
          if bt_result.get("status") != "success":
              print(
                  f"GATE 0 FAIL [criterion-3]: read_backtest status={bt_result.get('status')!r} "
                  f"error={bt_result.get('error')!r}"
              )
              sys.exit(1)

          backtest = bt_result.get("backtest")
          if not backtest:
              print("GATE 0 FAIL [criterion-3]: read_backtest returned empty backtest object")
              sys.exit(1)

          sharpe_str = find_sharpe(backtest)
          if sharpe_str is None:
              print(
                  f"GATE 0 FAIL [criterion-3]: Sharpe Ratio not found in backtest. "
                  f"Top-level keys: {list(backtest.keys())}"
              )
              sys.exit(1)

          try:
              sharpe_val = float(sharpe_str)
          except (ValueError, TypeError):
              sharpe_val = None

          if sharpe_val is None:
              print(f"GATE 0 FAIL [criterion-3]: Sharpe Ratio is not a valid number: {sharpe_str!r}")
              sys.exit(1)

          summary(f"✅ **Criterion 3 PASS** — read_backtest Sharpe={sharpe_str}")

          # Criterion 4: read_backtest_orders returns non-empty orders
          # QC may clear raw order data after ~10 days while keeping statistics.
          # Primary: check read_backtest_orders.length > 0.
          # Fallback: verify via read_backtest statistics["Total Orders"] > 0.
          orders_resp = tool_call(
              "read_backtest_orders",
              {
                  "project_id": PROJECT_ID,
                  "backtest_id": BACKTEST_ID,
                  "start": 0,
                  "end": 100,
              },
              session_id,
              req_id=3,
          )
          orders_result = parse_tool_json(orders_resp, "read_backtest_orders")
          if orders_result.get("status") != "success":
              print(
                  f"GATE 0 FAIL [criterion-4]: read_backtest_orders status={orders_result.get('status')!r} "
                  f"error={orders_result.get('error')!r}"
              )
              sys.exit(1)

          raw_order_count = orders_result.get("length", 0)
          stats_order_count = find_total_orders(backtest)
          effective_order_count = raw_order_count if raw_order_count > 0 else stats_order_count

          if effective_order_count == 0:
              print(
                  f"GATE 0 FAIL [criterion-4]: No orders found — "
                  f"read_backtest_orders.length={raw_order_count}, "
                  f"backtest statistics Total Orders={stats_order_count}"
              )
              sys.exit(1)

          order_source = "read_backtest_orders" if raw_order_count > 0 else "backtest statistics"
          if raw_order_count == 0 and stats_order_count > 0:
              summary(
                  f"  ⚠️  read_backtest_orders.length=0 (QC data retention); "
                  f"orders confirmed via backtest statistics: {stats_order_count}"
              )

          elapsed = time.monotonic() - t0
          summary(
              f"✅ **Criterion 4 PASS** — orders={effective_order_count} (source: {order_source})"
          )

          # ------------------------------------------------------------------ #
          # Criterion 5: both calls complete in < 10 seconds                    #
          # ------------------------------------------------------------------ #
          if elapsed >= TIMING_LIMIT_S:
              print(
                  f"GATE 0 FAIL [criterion-5]: read_backtest + read_backtest_orders "
                  f"took {elapsed:.2f}s — expected < {TIMING_LIMIT_S}s"
              )
              sys.exit(1)

          summary(f"✅ **Criterion 5 PASS** — elapsed={elapsed:.2f}s < {TIMING_LIMIT_S}s")

          # ------------------------------------------------------------------ #
          # Summary table                                                        #
          # ------------------------------------------------------------------ #
          summary("\n## 🎉 GATE 0 PASSED — All five criteria met\n")
          summary("| Metric | Value |")
          summary("|--------|-------|")
          summary(f"| Sharpe | {sharpe_val} |")
          summary(f"| Order count | {effective_order_count} (source: {order_source}) |")
          summary(f"| Elapsed (criteria 3+4) | {elapsed:.2f}s |")
          summary(f"| Session ID | {session_id} |")

          PYEOF

      - name: Upload response artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate0-mcp-responses
          path: /tmp/*.json

name: GATE-0 QC MCP Verify

on:
  workflow_dispatch:

jobs:
  verify-qc-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start QC MCP Server
        env:
          QUANTCONNECT_USER_ID: ${{ secrets.QC_USER_ID }}
          QUANTCONNECT_API_TOKEN: ${{ secrets.QC_API_TOKEN }}
          MCP_TRANSPORT: streamable-http
          MCP_HOST: 0.0.0.0
          MCP_PORT: "8000"
        run: |
          pip install uv
          uvx quantconnect-mcp &
          echo "Waiting for MCP server to be ready..."
          for i in $(seq 1 30); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 2 \
              -X POST http://localhost:8000/mcp \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              -d '{"jsonrpc":"2.0","id":-1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"probe","version":"1.0"}}}' \
              2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ]; then
              echo "MCP server is ready after ${i}s (HTTP $HTTP_STATUS)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "MCP server did not become ready within 30 seconds (last HTTP status: $HTTP_STATUS)"
              exit 1
            fi
            sleep 1
          done

      - name: MCP Initialize Handshake
        run: |
          SESSION_ID=$(curl -s -S -D - -X POST http://localhost:8000/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":0,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"gate0","version":"1.0"}}}' \
            | grep -i '^mcp-session-id:' | head -1 | awk '{print $2}' | tr -d '\r')
          if [ -z "$SESSION_ID" ]; then
            echo "GATE 0 FAIL: MCP initialize handshake did not return a Mcp-Session-Id header"
            exit 1
          fi
          echo "SESSION_ID=$SESSION_ID" >> $GITHUB_ENV
          echo "MCP session ID: $SESSION_ID"

      - name: Test 1 — validate_quantconnect_auth
        run: |
          set -euo pipefail
          echo "## Gate 0 Test 1: validate_quantconnect_auth" >> $GITHUB_STEP_SUMMARY
          RESPONSE=$(curl -s -S -X POST http://localhost:8000/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "Mcp-Session-Id: $SESSION_ID" \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"validate_quantconnect_auth","arguments":{}}}')
          echo "$RESPONSE" | tee /tmp/auth_response.json
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RESPONSE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 <<'EOF'
          import json, sys
          with open('/tmp/auth_response.json') as f:
              raw = f.read()
          print("Raw auth response:", raw)
          try:
              outer = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"GATE 0 FAIL: Could not parse auth response JSON: {e}")
              sys.exit(1)
          if "error" in outer:
              print(f"GATE 0 FAIL: Auth response contains error: {outer['error']}")
              sys.exit(1)
          result = outer.get("result", {})
          content = result.get("content", [])
          text = ""
          for item in content:
              if isinstance(item, dict) and item.get("type") == "text":
                  text += item.get("text", "")
          print("Auth tool text:", text)
          try:
              tool_result = json.loads(text)
          except json.JSONDecodeError as e:
              print(f"GATE 0 FAIL: Could not parse auth tool result JSON: {e}. Raw text: {text}")
              sys.exit(1)
          if not tool_result.get("success", False):
              print(f"GATE 0 FAIL: validate_quantconnect_auth did not return success=true. Got: {text}")
              sys.exit(1)
          print("Test 1 PASSED: QC auth validated successfully")
          EOF

      - name: Test 2 — read_backtest_orders
        run: |
          set -euo pipefail
          echo "## Gate 0 Test 2: read_backtest_orders" >> $GITHUB_STEP_SUMMARY
          RESPONSE=$(curl -s -S -X POST http://localhost:8000/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "Mcp-Session-Id: $SESSION_ID" \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"read_backtest_orders","arguments":{"project_id":28779543,"backtest_id":"29a044c64e018d411830f0580ae25dee","start":0,"end":100}}}')
          echo "$RESPONSE" | tee /tmp/orders_response.json
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RESPONSE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 <<'EOF'
          import json, sys
          with open('/tmp/orders_response.json') as f:
              raw = f.read()
          print("Raw orders response:", raw)
          try:
              outer = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"GATE 0 FAIL: Could not parse orders response JSON: {e}")
              sys.exit(1)
          if "error" in outer:
              print(f"GATE 0 FAIL: Orders response contains error: {outer['error']}")
              sys.exit(1)
          result = outer.get("result", {})
          content = result.get("content", [])
          text = ""
          for item in content:
              if isinstance(item, dict) and item.get("type") == "text":
                  text += item.get("text", "")
          print("Orders tool text:", text)
          try:
              tool_result = json.loads(text)
          except json.JSONDecodeError as e:
              print(f"GATE 0 FAIL: Could not parse orders tool result JSON: {e}")
              sys.exit(1)
          status = tool_result.get("status")
          length = tool_result.get("length", 0)
          if status != "success":
              print(f"GATE 0 FAIL: read_backtest_orders status={status!r}, expected 'success'")
              sys.exit(1)
          if length == 0:
              print(f"GATE 0 FAIL: read_backtest_orders returned length=0, expected >0")
              sys.exit(1)
          print(f"Test 2 PASSED: read_backtest_orders length={length}")
          EOF

      - name: Test 3 — read_backtest (Sharpe proof)
        run: |
          set -euo pipefail
          echo "## Gate 0 Test 3: read_backtest" >> $GITHUB_STEP_SUMMARY
          RESPONSE=$(curl -s -S -X POST http://localhost:8000/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "Mcp-Session-Id: $SESSION_ID" \
            -d '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"read_backtest","arguments":{"project_id":28779543,"backtest_id":"29a044c64e018d411830f0580ae25dee"}}}')
          echo "$RESPONSE" | tee /tmp/backtest_response.json
          echo '```json' >> $GITHUB_STEP_SUMMARY
          echo "$RESPONSE" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python3 <<'EOF'
          import json, sys
          with open('/tmp/backtest_response.json') as f:
              raw = f.read()
          print("Raw backtest response:", raw)
          try:
              outer = json.loads(raw)
          except json.JSONDecodeError as e:
              print(f"GATE 0 FAIL: Could not parse backtest response JSON: {e}")
              sys.exit(1)
          if "error" in outer:
              print(f"GATE 0 FAIL: Backtest response contains error: {outer['error']}")
              sys.exit(1)
          result = outer.get("result", {})
          content = result.get("content", [])
          text = ""
          for item in content:
              if isinstance(item, dict) and item.get("type") == "text":
                  text += item.get("text", "")
          print("Backtest tool text:", text)
          try:
              tool_result = json.loads(text)
          except json.JSONDecodeError as e:
              print(f"GATE 0 FAIL: Could not parse backtest tool result JSON: {e}")
              sys.exit(1)
          status = tool_result.get("status")
          backtest = tool_result.get("backtest")
          if status != "success":
              print(f"GATE 0 FAIL: read_backtest status={status!r}, expected 'success'")
              sys.exit(1)
          if not backtest:
              print(f"GATE 0 FAIL: read_backtest returned null/empty backtest object")
              sys.exit(1)
          sharpe = None
          stats = backtest.get("Statistics", {})
          if isinstance(stats, dict):
              sharpe = stats.get("Sharpe Ratio") or stats.get("SharpeRatio")
          if sharpe is None:
              result_stats = backtest.get("result", {})
              if isinstance(result_stats, dict):
                  sharpe = result_stats.get("SharpeRatio") or result_stats.get("Sharpe Ratio")
          if sharpe is None:
              print(f"GATE 0 FAIL: read_backtest did not return a Sharpe ratio in the backtest object")
              sys.exit(1)
          print(f"Test 3 PASSED: read_backtest returned valid backtest object. Sharpe={sharpe}")
          EOF

      - name: Gate 0 Hard Fail Check
        run: |
          echo "## Gate 0 Hard Fail Check" >> $GITHUB_STEP_SUMMARY
          python3 <<'EOF'
          import json, sys

          def load_tool_result(filepath):
              with open(filepath) as f:
                  raw = f.read()
              outer = json.loads(raw)
              result = outer.get("result", {})
              content = result.get("content", [])
              text = ""
              for item in content:
                  if isinstance(item, dict) and item.get("type") == "text":
                      text += item.get("text", "")
              return json.loads(text)

          failures = []
          orders_length = 0
          sharpe = None

          try:
              auth = load_tool_result('/tmp/auth_response.json')
              if not auth.get("success", False):
                  failures.append(f"validate_quantconnect_auth did not return success=true. Got: {auth}")
          except Exception as e:
              failures.append(f"Failed to parse auth response: {e}")

          try:
              orders = load_tool_result('/tmp/orders_response.json')
              orders_length = orders.get("length", 0)
              orders_status = orders.get("status")
              if orders_status != "success":
                  failures.append(f"read_backtest_orders status={orders_status!r} != 'success'")
              if orders_length == 0:
                  failures.append("read_backtest_orders length=0, expected >0")
          except Exception as e:
              failures.append(f"Failed to parse orders response: {e}")

          try:
              backtest_result = load_tool_result('/tmp/backtest_response.json')
              backtest_status = backtest_result.get("status")
              backtest = backtest_result.get("backtest")
              if backtest_status != "success":
                  failures.append(f"read_backtest status={backtest_status!r} != 'success'")
              if not backtest:
                  failures.append("read_backtest returned null/empty backtest object")
              if backtest:
                  stats = backtest.get("Statistics", {})
                  if isinstance(stats, dict):
                      sharpe = stats.get("Sharpe Ratio") or stats.get("SharpeRatio")
              if sharpe is None and backtest:
                  failures.append("read_backtest did not return a Sharpe ratio in the backtest object")
          except Exception as e:
              failures.append(f"Failed to parse backtest response: {e}")

          if failures:
              for msg in failures:
                  print(f"GATE 0 FAIL: {msg}")
              sys.exit(1)

          print(f"GATE 0 PASSED -- orders_count={orders_length}, Sharpe={sharpe}")
          EOF

      - name: Upload response artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate0-mcp-responses
          path: /tmp/*.json

name: GATE-0 QC MCP Verify

on:
  workflow_dispatch:

jobs:
  verify-qc-mcp:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      QC_USER_ID: ${{ secrets.QC_USER_ID }}
      QC_API_TOKEN: ${{ secrets.QC_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Gate 0 — live backtest via qc_rest_client
        run: |
          echo "## Gate 0: Live Backtest" >> $GITHUB_STEP_SUMMARY
          python scripts/qc_rest_client.py \
            --strategy strategies/reference/sma_crossover_simple.py \
            --output /tmp/backtest_result.json

      - name: Assert Sharpe present
        run: |
          echo "## Gate 0 Hard Fail Check" >> $GITHUB_STEP_SUMMARY
          python3 - <<'EOF'
          import json, sys
          with open('/tmp/backtest_result.json') as f:
              r = json.load(f)
          print(json.dumps(r, indent=2))
          sharpe = r.get('sharpe_ratio')
          if sharpe is None:
              print('❌ GATE 0 FAIL: sharpe_ratio is null')
              sys.exit(1)
          print(f'✅ GATE 0 PASSED — Sharpe={sharpe}, project={r["project_id"]}')
          EOF

      - name: Upload result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate0-backtest-result
          path: /tmp/backtest_result.json
